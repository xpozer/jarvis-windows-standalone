name: Frontend Stack Preview

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-stack-preview.yml"
  workflow_dispatch:

jobs:
  build-stack-preview:
    name: Build stack preview
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm run test

      - name: Build stack preview
        working-directory: frontend
        run: npm run build:stack-preview

      - name: Upload stack preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-stack-preview
          path: docs/stack-preview
          if-no-files-found: error
