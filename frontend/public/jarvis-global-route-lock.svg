<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="78%"><stop offset="0" stop-color="#082a48"/><stop offset="0.48" stop-color="#03111e"/><stop offset="1" stop-color="#02050a"/></radialGradient>
    <radialGradient id="lockGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffffff"/><stop offset="0.08" stop-color="#7ee7ff"/><stop offset="0.35" stop-color="#0b85df" stop-opacity="0.65"/><stop offset="1" stop-color="#000000" stop-opacity="0"/></radialGradient>
    <linearGradient id="routeBlue" x1="0" x2="1"><stop offset="0" stop-color="#0b5f90" stop-opacity="0.1"/><stop offset="0.48" stop-color="#12d9ff"/><stop offset="1" stop-color="#7ee7ff"/></linearGradient>
    <linearGradient id="routeRed" x1="0" x2="1"><stop offset="0" stop-color="#ff365f" stop-opacity="0"/><stop offset="0.52" stop-color="#ff365f"/><stop offset="1" stop-color="#ff365f" stop-opacity="0.15"/></linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M50 0H0v50" fill="none" stroke="#0a5d86" stroke-width="1" opacity="0.22"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style><![CDATA[
      .mono{font-family:Consolas,Menlo,monospace}.hud{fill:none;stroke:#0bbce8;stroke-opacity:.45}.land{fill:#0a2a42;stroke:#27cfff;stroke-width:1.2;stroke-opacity:.72;filter:url(#glow)}.land2{fill:#06182b;stroke:#0b6d98;stroke-width:.8;stroke-opacity:.55}.country{fill:none;stroke:#7ee7ff;stroke-width:.65;stroke-opacity:.28}.route{fill:none;stroke:url(#routeBlue);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:9 13;filter:url(#glow);opacity:.78}.routeSoft{fill:none;stroke:#12d9ff;stroke-width:9;stroke-linecap:round;opacity:.05}.redRoute{fill:none;stroke:url(#routeRed);stroke-width:1.35;stroke-dasharray:5 12;filter:url(#glow);opacity:.65}.node{fill:#7ee7ff;filter:url(#glow)}.nodeRing{fill:none;stroke:#7ee7ff;stroke-width:1.6;stroke-opacity:.75}.packet{fill:#ffffff;filter:url(#glow)}.packetCyan{fill:#7ee7ff;filter:url(#glow)}.packetRed{fill:#ff365f;filter:url(#glow)}.micro{fill:#9feeff;font-size:11px;letter-spacing:1.6px}.title{fill:#eafcff;font-size:46px;letter-spacing:9px}.sub{fill:#a7eaff;font-size:14px;letter-spacing:2px}.tiny{fill:#78cdec;font-size:10px;letter-spacing:1px}.pulse{animation:pulse 1.45s ease-in-out infinite}.slowPulse{animation:pulse 2.4s ease-in-out infinite}.spin{transform-box:fill-box;transform-origin:center;animation:spin 12s linear infinite}.spinRev{transform-box:fill-box;transform-origin:center;animation:spinRev 16s linear infinite}.scan{animation:scan 4s linear infinite}.dash{animation:dash 2.4s linear infinite}.fadeHop{animation:fadeHop 1.1s ease-in-out infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes spinRev{to{transform:rotate(-360deg)}}@keyframes pulse{0%,100%{opacity:.42;transform:scale(.96)}50%{opacity:1;transform:scale(1.06)}}@keyframes scan{0%{transform:translateX(-520px);opacity:0}20%{opacity:.42}80%{opacity:.42}100%{transform:translateX(520px);opacity:0}}@keyframes dash{to{stroke-dashoffset:-220}}@keyframes fadeHop{0%,100%{opacity:.25}45%{opacity:1}}
    ]]></style>
